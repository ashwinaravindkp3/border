# mosquitto_fog.conf
# Mosquitto configuration for the Fog Node broker (runs on Raspberry Pi fog node).
# This file is used on Windows during development and deployed to the Pi.
#
# IMPORTANT: Bridge topic directions are strictly one-way to prevent feedback loops.
#
#   UPLINK  (edge → server, "out"): heartbeat, event, status, challenge_response
#   DOWNLINK (server → edge, "in"):  command, challenge
#
# "out" = publish from local broker to remote broker (fog → server)
# "in"  = subscribe from remote broker and publish locally (server → fog)

# ─── Local broker listener ────────────────────────────────────────────────────
listener 1883 0.0.0.0
allow_anonymous true

# ─── Bridge to server MQTT broker ────────────────────────────────────────────
connection border_server_bridge
address 10.42.0.1:1883
cleansession true
clientid fog_bridge_01
keepalive 30
restart_timeout 5

# UPLINK — fog → server only (edge telemetry, never loops back)
topic border/+/heartbeat out 0
topic border/+/event out 0
topic border/+/status out 0
topic border/+/challenge_response out 0

# DOWNLINK — server → fog only (commands and challenges, never forwarded upstream)
topic border/+/command in 0
topic border/zone/+/command in 0
topic border/+/challenge in 0
